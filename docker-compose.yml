services:
  db:
    image: mysql:8.0
    container_name: saliksikhub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: saliksikhub
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - saliksikhub

volumes:
  mysql_data:

networks:
  saliksikhub:
    driver: bridge